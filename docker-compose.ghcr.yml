services:
  hltv-mcp:
    image: ghcr.io/arcdent/hltv-data:latest
    ports:
      - "8082:8082"
    environment:
      - HTTP_PORT=8082
      - HTTP_HOST=0.0.0.0
      - HLTV_CHROME_PATH=/headless-shell/headless-shell
      # ENCRYPTION_KEY is optional; if not set, auto-generated into ./data/.encryption_key
    volumes:
      - ./data:/data
    pull_policy: always
    restart: unless-stopped
