services:
  hltv-mcp:
    # Pull from GitHub Container Registry (recommended)
    image: ghcr.io/arcdent/hltv-data:latest
    pull_policy: always
    # Or build from local source:
    # build: .
    ports:
      - "8082:8082"
    environment:
      - HTTP_PORT=8082
      - HTTP_HOST=0.0.0.0
    volumes:
      - ./data:/data
    restart: unless-stopped
